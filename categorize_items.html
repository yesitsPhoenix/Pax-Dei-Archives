<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax Dei Archives - Categorize Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend/www/css/style.css">
    <link rel="stylesheet" href="frontend/www/css/sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="icon" href="frontend/www/assets/logo.png" type="image/png">
    <style>
        /* Purple admin sidebar theme */
        #sidebar {
            box-shadow: 0 0 10px 3px rgba(139, 92, 246, 0.55),
                        0 0 20px 7px rgba(109, 40, 217, 0.35) !important;
        }
        #sidebar a.active,
        #sidebar a.active:hover {
            background-color: #7c3aed;
            color: white;
        }
        #sidebar a.active i { color: white; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6d28d9; }

        .save-btn-success {
            background-color: #059669 !important;
            border-color: #059669 !important;
        }
        .row-saved td {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <h1 class="text-xl font-semibold mt-6 mb-3 text-white text-center">Item Category Manager</h1>
    <div class="h-1 w-24 bg-[#FFD700] mx-auto rounded-full mb-6"></div>

    <div class="container mx-auto px-4 max-w-6xl">

        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 text-center">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Total Items</p>
                <p id="stat-total" class="text-white text-2xl font-bold">—</p>
            </div>
            <div class="bg-gray-800 border border-red-700/40 rounded-lg p-4 text-center">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Uncategorized</p>
                <p id="stat-uncategorized" class="text-red-400 text-2xl font-bold">—</p>
            </div>
            <div class="bg-gray-800 border border-green-700/40 rounded-lg p-4 text-center">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Categorized</p>
                <p id="stat-categorized" class="text-green-400 text-2xl font-bold">—</p>
            </div>
        </div>

        <!-- Filter / Search Bar -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 mb-4 flex flex-wrap gap-3 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-1">Search Item Name</label>
                <input id="search-input" type="text" placeholder="e.g. Iron Ore..."
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-violet-500 transition-colors" />
            </div>
            <div class="min-w-[180px]">
                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-1">Show</label>
                <select id="filter-status"
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-violet-500 transition-colors">
                    <option value="null">Uncategorized only</option>
                    <option value="all">All items</option>
                    <option value="categorized">Categorized only</option>
                </select>
            </div>
            <div class="min-w-[180px]">
                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-1">Filter by Category</label>
                <select id="filter-category"
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-violet-500 transition-colors">
                    <option value="">All Categories</option>
                </select>
            </div>
            <button id="btn-clear-search"
                class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded-lg transition-colors">
                <i class="fas fa-times mr-1"></i> Clear
            </button>
        </div>

        <!-- Bulk Action Bar -->
        <div class="bg-gray-800 border border-violet-700/40 rounded-lg p-3 mb-4 flex flex-wrap gap-3 items-center">
            <label class="flex items-center gap-2 text-gray-300 text-sm cursor-pointer select-none">
                <input id="select-all-checkbox" type="checkbox" class="rounded text-violet-600 w-4 h-4">
                Select visible
            </label>
            <span class="text-gray-500 text-sm" id="selected-count">0 selected</span>
            <div class="flex-1"></div>
            <select id="bulk-category-select"
                class="bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-violet-500 transition-colors min-w-[180px]">
                <option value="">— Assign category —</option>
            </select>
            <button id="btn-bulk-apply"
                class="bg-violet-600 hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm px-4 py-2 rounded-lg transition-colors font-semibold">
                <i class="fas fa-tag mr-1"></i> Apply to Selected
            </button>
        </div>

        <!-- Table -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden mb-4">
            <div id="table-loader" class="text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p class="text-sm">Loading items...</p>
            </div>
            <table id="items-table" class="w-full hidden">
                <thead>
                    <tr class="bg-gray-900/60 border-b border-gray-700">
                        <th class="px-4 py-3 w-8"></th>
                        <th class="px-4 py-3 text-left text-gray-400 text-xs uppercase tracking-wider w-16">ID</th>
                        <th class="px-4 py-3 text-left text-gray-400 text-xs uppercase tracking-wider">Item Name</th>
                        <th class="px-4 py-3 text-left text-gray-400 text-xs uppercase tracking-wider w-44">Current Category</th>
                        <th class="px-4 py-3 text-left text-gray-400 text-xs uppercase tracking-wider w-52">Assign Category</th>
                        <th class="px-4 py-3 w-20"></th>
                    </tr>
                </thead>
                <tbody id="items-tbody">
                </tbody>
            </table>
            <div id="table-empty" class="hidden text-center py-12 text-gray-500 text-sm">
                No items match the current filters.
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex items-center justify-center gap-2 mb-10 flex-wrap"></div>

    </div>

    <div id="footer-placeholder"></div>

    <div id="floating-avatar-container">
        <img id="floating-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="User Avatar" class="floating-avatar js-floating-avatar">
    </div>
    <div id="auth-modal">
        <div class="modal-content-wrapper" id="modal-content-wrapper"></div>
    </div>

    <script type="module">
        import { setupAdminAuthListener } from './frontend/www/js/admin/adminManager.js';
        setupAdminAuthListener();
    </script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="module" src="frontend/www/js/ui/loadHeader.js"></script>
    <script type="module" src="frontend/www/js/ui/loadFooter.js"></script>
    <script type="module" src="frontend/www/js/main.js"></script>
    <script type="module" src="frontend/www/js/popoutAuth.js"></script>
    <script type="module" src="frontend/www/js/sidebar.js"></script>
    <script type="module" src="frontend/www/js/categorize_items.js"></script>
</body>
</html>
